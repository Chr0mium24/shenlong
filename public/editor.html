<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>台词配置编辑器</title>
    <link rel="stylesheet" href="/editor.css" />
  </head>
  <body>
    <main class="editor-root">
      <header class="toolbar">
        <div>
          <h1>台词配置编辑器</h1>
          <p>自动保存到本地草稿，可一键保存到服务器配置文件。</p>
        </div>
        <div class="toolbar-actions">
          <button id="save-server-btn" class="btn btn-primary">保存到服务器</button>
          <button id="reload-btn" class="btn">从服务器重载</button>
          <button id="clear-draft-btn" class="btn">清空本地草稿</button>
          <a href="/" class="btn">返回游戏</a>
        </div>
      </header>

      <section class="status-bar">
        <span id="status-text">加载中...</span>
      </section>

      <section id="rows" class="rows"></section>
    </main>

    <script type="module" src="/editor.js"></script>
  </body>
</html>
