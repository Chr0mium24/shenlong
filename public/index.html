<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>男皇后：戏台浮梦</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              stage: {
                bg: '#0f0a07',
                panel: '#1e1511',
                accent: '#e1b16a',
                ink: '#f4e8d3',
                blood: '#9f2e2e'
              }
            },
            boxShadow: {
              ember: '0 0 0 1px rgba(225, 177, 106, 0.35), 0 25px 50px -12px rgba(0, 0, 0, 0.8)'
            },
            fontFamily: {
              serifcn: ['"Noto Serif SC"', '"Source Han Serif SC"', 'serif']
            }
          }
        }
      };
    </script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap"
    />
    <style>
      body {
        background:
          radial-gradient(circle at 20% 15%, rgba(159, 46, 46, 0.25), transparent 38%),
          radial-gradient(circle at 78% 10%, rgba(225, 177, 106, 0.2), transparent 40%),
          linear-gradient(135deg, #0f0a07 0%, #170d08 55%, #2b1711 100%);
      }
      .enter-fade {
        animation: riseIn 420ms ease-out;
      }
      .mingpan-rotor {
        animation: slowSpin 24s linear infinite;
      }
      .choice-btn:hover .choice-omen {
        filter: saturate(1.2);
      }
      body.ending-cinematic-mode {
        overflow: hidden;
      }
      body.ending-cinematic-mode > main > header,
      body.ending-cinematic-mode > main > section > aside {
        opacity: 0;
        pointer-events: none;
      }
      .ending-cinematic {
        background: radial-gradient(circle at 50% 18%, rgba(225, 177, 106, 0.08), transparent 40%), #030303;
      }
      .ending-cinematic-world {
        position: absolute;
        inset: 0;
        transform-origin: 50% 58%;
        animation: endingPullback 4.2s cubic-bezier(0.2, 0.6, 0.25, 1) forwards;
      }
      .ending-cinematic-mingpan-wrap {
        position: absolute;
        left: 50%;
        top: 54%;
        width: 300px;
        height: 300px;
        transform: translate(-50%, -50%);
      }
      .ending-cinematic-mingpan-glow {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        opacity: 0.4;
        filter: blur(26px);
        animation: mingpanShrink 4.2s ease forwards;
      }
      .ending-cinematic-mingpan {
        position: absolute;
        inset: 22px;
        border-radius: 999px;
        border: 1px solid rgba(225, 177, 106, 0.35);
        animation: mingpanSpin 1.2s linear infinite, mingpanShrink 4.2s ease forwards;
      }
      .ending-cinematic-stage {
        position: absolute;
        left: 50%;
        top: 67%;
        width: 300px;
        height: 170px;
        border: 1px solid rgba(225, 177, 106, 0.45);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(44, 30, 20, 0.82), rgba(9, 9, 9, 0.95));
        transform: translate(-50%, -50%);
        box-shadow: 0 0 0 1px rgba(225, 177, 106, 0.2), 0 10px 45px rgba(0, 0, 0, 0.7);
      }
      .ending-cinematic-paper {
        position: absolute;
        bottom: 24px;
        width: 56px;
        height: 98px;
        border: 1px solid rgba(245, 234, 215, 0.4);
        background: linear-gradient(180deg, rgba(245, 234, 215, 0.25), rgba(245, 234, 215, 0.08));
        clip-path: polygon(8% 4%, 92% 0, 100% 94%, 12% 100%);
        animation: paperFloat 2.3s ease-in-out infinite alternate;
      }
      .ending-cinematic-paper--left {
        left: 58px;
      }
      .ending-cinematic-paper--center {
        left: 122px;
        animation-delay: 180ms;
      }
      .ending-cinematic-paper--right {
        left: 186px;
        animation-delay: 360ms;
      }
      .ending-cinematic-crowd {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 10%;
        height: 90px;
      }
      .ending-cinematic-crowd-item {
        position: absolute;
        bottom: 0;
        width: 14px;
        border-radius: 7px 7px 2px 2px;
        background: rgba(0, 0, 0, 0.95);
        opacity: 0;
        animation: crowdFadeIn 900ms ease-out forwards;
      }
      .story-line {
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 260ms ease, transform 260ms ease, filter 260ms ease;
      }
      .story-line.is-in {
        opacity: 1;
        transform: translateY(0);
      }
      .story-line.is-out {
        opacity: 0;
        transform: translateY(-6px);
        filter: blur(1.2px);
      }
      .story-line-speaker {
        margin-bottom: 6px;
        font-size: 12px;
        letter-spacing: 0.18em;
        color: rgba(225, 177, 106, 0.9);
      }
      .story-line-text {
        margin: 0;
        line-height: 1.9;
        color: rgba(244, 232, 211, 0.94);
      }
      .story-line--narration {
        border-left: 2px solid rgba(225, 177, 106, 0.25);
        padding-left: 10px;
      }
      .story-line--dialogue {
        border-left: 3px solid rgba(95, 214, 191, 0.64);
        background: linear-gradient(90deg, rgba(95, 214, 191, 0.14), transparent 52%);
        border-radius: 10px;
        padding: 10px 12px;
      }
      .story-line--verse {
        border: 1px solid rgba(225, 177, 106, 0.32);
        background: linear-gradient(180deg, rgba(225, 177, 106, 0.12), rgba(225, 177, 106, 0.03));
        border-radius: 12px;
        padding: 12px 14px;
      }
      .story-line--verse .story-line-text {
        text-align: center;
        letter-spacing: 0.05em;
        color: rgba(248, 238, 222, 0.97);
      }
      .story-line--note {
        border: 1px dashed rgba(225, 177, 106, 0.32);
        border-radius: 10px;
        padding: 10px 12px;
        background: rgba(0, 0, 0, 0.24);
      }
      .portrait-shell {
        height: 100%;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 260ms ease, transform 260ms ease;
      }
      .portrait-shell.is-in {
        opacity: 1;
        transform: translateY(0);
      }
      .portrait-shell.is-out {
        opacity: 0;
        transform: translateY(-6px);
      }
      .portrait-shell--active {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: stretch;
      }
      .portrait-img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        border: 1px solid rgba(225, 177, 106, 0.35);
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.42);
      }
      .portrait-name {
        margin: 0;
        text-align: center;
        font-size: 12px;
        letter-spacing: 0.2em;
        color: rgba(225, 177, 106, 0.9);
      }
      .portrait-shell--fallback .portrait-fallback {
        height: 220px;
        border-radius: 10px;
        border: 1px dashed rgba(225, 177, 106, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: rgba(244, 232, 211, 0.85);
      }
      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slowSpin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes endingPullback {
        0% {
          transform: scale(1.24) translateY(8px);
          filter: blur(0);
        }
        65% {
          transform: scale(0.62) translateY(-84px);
          filter: blur(0.4px);
        }
        100% {
          transform: scale(0.35) translateY(-175px);
          filter: blur(1.1px);
        }
      }
      @keyframes mingpanSpin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes mingpanShrink {
        0% { opacity: 1; transform: scale(1); }
        80% { opacity: 0.95; }
        100% { opacity: 0.25; transform: scale(0.28); }
      }
      @keyframes paperFloat {
        from { transform: translateY(0px) rotate(-1deg); }
        to { transform: translateY(-4px) rotate(1deg); }
      }
      @keyframes crowdFadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body class="min-h-screen text-stage-ink font-serifcn">
    <main class="mx-auto flex min-h-screen w-full max-w-7xl flex-col gap-4 px-4 py-6 lg:px-8">
      <header class="flex flex-col justify-between gap-3 rounded-2xl border border-stage-accent/30 bg-stage-panel/80 p-4 shadow-ember backdrop-blur md:flex-row md:items-center">
        <div>
          <p class="text-xs tracking-[0.3em] text-stage-accent/90">INTERACTIVE STAGE</p>
          <h1 id="game-title" class="text-2xl font-semibold text-stage-ink">男皇后：戏台浮梦</h1>
        </div>
        <button id="restart-btn" class="rounded-lg border border-stage-blood/50 px-3 py-1.5 text-sm text-stage-ink transition hover:bg-stage-blood/20">
          再入此梦
        </button>
      </header>

      <section class="grid flex-1 gap-4 lg:grid-cols-[280px_1fr]">
        <aside class="rounded-2xl border border-stage-accent/25 bg-stage-panel/80 p-4 shadow-ember backdrop-blur">
          <p class="mb-2 text-xs uppercase tracking-[0.3em] text-stage-accent/80">命盘</p>
          <div id="stats-list" class="text-sm"></div>
          <div class="mt-6 border-t border-stage-accent/20 pt-3 text-xs text-stage-ink/70 leading-6">
            一念生，一念灭。你在宫闱中的每次应答，都在改写戏台落幕的方向。
          </div>
        </aside>

        <section class="rounded-2xl border border-stage-accent/25 bg-stage-panel/85 p-5 shadow-ember backdrop-blur">
          <div id="game-view" class="space-y-4"></div>
        </section>
      </section>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
